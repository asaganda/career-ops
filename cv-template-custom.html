<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — CV</title>
<style>
  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
  }

  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin-ext.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  body {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    color: #111;
    background: #ffffff;
    padding: 0;
    margin: 0;
  }

  .page { width: 100%; max-width: {{PAGE_WIDTH}}; margin: 0 auto; padding: 2px 0; }

  /* === HEADER — centered === */
  .header {
    text-align: center;
    margin-bottom: 14px;
  }

  .header h1 {
    font-family: 'DM Sans', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: #111;
    margin-bottom: 5px;
    line-height: 1.2;
  }

  .contact-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0 3px;
    font-size: 14px;
    line-height: 1.5;
    color: #333;
  }

  .contact-row a { color: #333; text-decoration: underline; }
  .contact-row .separator { color: #333; }
  .contact-row .email { text-decoration: underline; }

  /* === SECTIONS === */
  .section { margin-bottom: 14px; }

  .section-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 17px;
    font-weight: 700;
    text-align: left;
    color: #111;
    border-bottom: 1px solid #111;
    padding-bottom: 3px;
    margin-bottom: 8px;
    line-height: 1.3;
  }

  /* === PROFESSIONAL SUMMARY === */
  .summary-text { font-size: 14px; line-height: 1.65; color: #222; }

  a { white-space: nowrap; }

  /* === SKILLS — inline paragraph with bold label === */
  .skills-block {
    font-size: 14px;
    color: #222;
    line-height: 1.65;
    margin-bottom: 3px;
  }

  .skills-block .skill-category {
    font-weight: 700;
    color: #111;
  }

  /* === CORE COMPETENCIES — rendered inline if used === */
  .competencies-grid {
    font-size: 14px;
    color: #222;
    line-height: 1.65;
  }

  .competency-tag {
    display: inline;
    font-size: 14px;
    font-weight: normal;
    color: #222;
    background: none;
    padding: 0;
    border: none;
    border-radius: 0;
  }

  .competency-tag::after { content: ', '; }
  .competency-tag:last-child::after { content: ''; }

  /* === WORK EXPERIENCE === */
  .job { margin-bottom: 12px; }

  .job-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 1px;
  }

  /* Combined role + company on one line */
  .job-role-company {
    font-size: 14px;
    font-weight: 700;
    color: #111;
  }

  /* Standalone company (used for last/freelance entry) */
  .job-company {
    font-size: 14px;
    font-weight: 700;
    color: #111;
  }

  .job-period {
    font-size: 14px;
    font-weight: 700;
    color: #111;
    white-space: nowrap;
  }

  /* Standalone role line (used for last/freelance entry) */
  .job-role {
    font-size: 14px;
    font-weight: 400;
    font-style: italic;
    color: #333;
    margin-bottom: 4px;
  }

  .job ul { padding-left: 16px; margin-top: 4px; }
  .job li { font-size: 14px; line-height: 1.65; color: #222; margin-bottom: 3px; }
  .job li strong { font-weight: 700; }

  /* === PROJECTS === */
  .project { margin-bottom: 10px; }

  .project-title {
    font-size: 14px;
    font-weight: 700;
    color: #111;
  }

  .project-badge {
    font-size: 12px;
    font-weight: 600;
    color: #555;
    background: none;
    padding: 0;
    margin-left: 6px;
  }

  .project-desc { font-size: 14px; color: #222; margin-top: 2px; line-height: 1.55; }
  .project-tech { font-size: 13px; color: #555; margin-top: 2px; font-style: italic; }

  /* === EDUCATION === */
  .edu-item { margin-bottom: 6px; }

  .edu-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }

  .edu-title { font-weight: 700; font-size: 14px; color: #111; }
  .edu-org { font-weight: 700; color: #111; }
  .edu-year { font-size: 14px; color: #333; white-space: nowrap; }
  .edu-desc { font-size: 13px; color: #444; margin-top: 2px; line-height: 1.5; }

  /* === CERTIFICATIONS === */
  .cert-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 4px;
  }

  .cert-title { font-size: 14px; font-weight: 500; color: #222; }
  .cert-org { font-weight: 700; color: #111; }
  .cert-year { font-size: 13px; color: #555; white-space: nowrap; }

  /* === PRINT === */
  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .page { padding: 0; }
  }

  .avoid-break, .job, .project, .edu-item, .cert-item {
    break-inside: avoid;
    page-break-inside: avoid;
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header avoid-break">
    <h1>{{NAME}}</h1>
    <div class="contact-row">
      <span>{{LOCATION}}</span>
      <span class="separator"> | </span>
      <a href="mailto:{{EMAIL}}" class="email">{{EMAIL}}</a>
      <span class="separator"> | </span>
      <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a>
      <span class="separator"> | </span>
      <a href="{{GITHUB_URL}}">{{GITHUB_DISPLAY}}</a>
      <span class="separator"> | </span>
      <a href="{{PORTFOLIO_URL}}">{{PORTFOLIO_DISPLAY}}</a>
    </div>
  </div>

  <!-- PROFESSIONAL SUMMARY -->
  <div class="section avoid-break">
    <div class="section-title">Professional Summary</div>
    <div class="summary-text">{{SUMMARY_TEXT}}</div>
  </div>

  <!-- SKILLS -->
  <div class="section avoid-break">
    <div class="section-title">Core Competencies & Skills</div>
    {{SKILLS}}
  </div>

  <!-- WORK EXPERIENCE -->
  <div class="section">
    <div class="section-title">Professional Experience</div>
    {{EXPERIENCE}}
  </div>

  <!-- EDUCATION -->
  <div class="section avoid-break">
    <div class="section-title">Education</div>
    {{EDUCATION}}
  </div>

  <!-- CERTIFICATIONS -->
  <div class="section avoid-break">
    <div class="section-title">Certifications</div>
    {{CERTIFICATIONS}}
  </div>

</div>
</body>
</html>
