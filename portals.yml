# Portal Scanner Configuration — Andrew Saganda
# Customized for: Frontend Engineer / UI Engineer roles
# Location: NYC metro or remote | April 2026

# Strategy (3 levels):
# 1. Playwright → careers_url of each company (real-time, reliable)
# 2. Greenhouse API → structured JSON (fast, Greenhouse-only)
# 3. WebSearch with site: filters (broad discovery, may be stale)

# -- Title filter --
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # [CUSTOMIZE] Frontend & UI roles
    - "Frontend"
    - "Front End"
    - "Front-End"
    - "UI Engineer"
    - "UI Developer"
    - "UI/UX Engineer"
    - "React Engineer"
    - "React Developer"
    - "Full Stack"
    - "Fullstack"
    - "Growth Engineer"
    - "Experimentation Engineer"
    - "CRO Engineer"
    - "Web Optimization Engineer"
    - "Conversion Engineer"
    - "A/B Testing Engineer"
    - "Growth Platform Engineer"
    - "Optimization Engineer"
    - "Software Engineer, Experimentation"
    - "Software Engineer, Conversion"
    - "Frontend Software Engineer"
    - "Software Engineer, Frontend"
    - "Software Engineer, Growth"
    - "Software Engineer, UI"
    - "Software Engineer, Full Stack"
    - "Software Engineer, Fullstack"
    - "Software Engineer, Web"

  negative:
    - "Junior"
    - "Intern"
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Mainframe"
    - "COBOL"
    - "DevOps"
    - "Data Engineer"
    - "Data Scientist"
    - "Machine Learning"
    - "Backend Engineer"
    - "Backend"
    - "Infrastructure"
    - "Platform Engineer"
    - "Data Platform"
    - "Release Infra"
    - "Compute"
    - "CDN"
    - "Deployment"
    - "Health Records"
    - "Healthcare"
    - "Java"
    - "Lua"
    - "Staff"
    - "Principal"

  seniority_boost:
    - "Senior"
    - "Lead"
    - "Mid-Level"

# -- Location filter --
# Jobs with a location string that matches a block pattern are dropped,
# UNLESS the location also matches an allow pattern (allow wins).
# Empty location strings (location unknown) are allowed through by default.

location_filter:
  # Allow these — US locations and remote (without an explicit non-US country)
  allow:
    - "United States"
    - "Remote"
    - "New York"
    - "San Francisco"
    - "Seattle"
    - "Los Angeles"
    - "Austin"
    - "Boston"
    - "Chicago"
    - "Denver"
    - "Atlanta"
    - "Miami"
    - ", NY"
    - ", CA"
    - ", WA"
    - ", TX"
    - ", MA"
    - ", CO"
    - ", GA"
    - ", FL"
    - ", NJ"
    - ", IL"

  # Block these explicit non-US locations
  block:
    - "Brazil"
    - "São Paulo"
    - "Poland"
    - "Portugal"
    - "Aveiro"
    - "Dublin"
    - "Ireland"
    - "Canada"
    - "Vancouver"
    - "Toronto"
    - "United Kingdom"
    - "London"
    - "Germany"
    - "Berlin"
    - "France"
    - "Paris"
    - "Netherlands"
    - "Amsterdam"
    - "Spain"
    - "Madrid"
    - "Barcelona"
    - "India"
    - "Bangalore"
    - "Singapore"
    - "Australia"
    - "Sydney"
    - "Mexico"
    - "Europe"
    - "EMEA"
    - "APAC"
    - "Latam"

# -- Search queries --

search_queries:

  # -- Ashby --
  - name: Ashby — Frontend Engineer
    query: 'site:jobs.ashbyhq.com "Frontend Engineer" OR "Front End Engineer" React remote'
    enabled: true

  - name: Ashby — UI Engineer
    query: 'site:jobs.ashbyhq.com "UI Engineer" OR "UI Developer" OR "Web Developer" React remote'
    enabled: true

  - name: Ashby — Full Stack (Frontend-leaning)
    query: 'site:jobs.ashbyhq.com "Full Stack" React TypeScript remote'
    enabled: true

  # -- Greenhouse --
  - name: Greenhouse — Frontend Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Frontend Engineer" OR "Front End Engineer" React TypeScript remote'
    enabled: true

  - name: Greenhouse — UI Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "UI Engineer" OR "UI Developer" React remote'
    enabled: true

  - name: Greenhouse — Full Stack React
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Full Stack" React TypeScript Node.js remote'
    enabled: true

  # -- Lever --
  - name: Lever — Frontend Engineer
    query: 'site:jobs.lever.co "Frontend Engineer" OR "Front End Engineer" React TypeScript remote'
    enabled: true

  - name: Lever — UI/Web Engineer
    query: 'site:jobs.lever.co "UI Engineer" OR "Web Developer" OR "Full Stack" React remote'
    enabled: true

  # -- Wellfound (startups) --
  - name: Wellfound — Frontend React
    query: 'site:wellfound.com "Frontend Engineer" OR "UI Engineer" React TypeScript remote NYC'
    enabled: true

  # -- Workable --
  - name: Workable — Frontend
    query: 'site:apply.workable.com "Frontend Engineer" OR "UI Engineer" React TypeScript remote'
    enabled: true

  # -- NYC-specific --
  - name: NYC Frontend — All portals
    query: '"Frontend Engineer" OR "UI Engineer" React TypeScript "New York" site:job-boards.greenhouse.io OR site:jobs.ashbyhq.com OR site:jobs.lever.co'
    enabled: true

  # -- Growth / Experimentation / CRO roles --
  - name: Ashby — Growth Engineer
    query: 'site:jobs.ashbyhq.com "Growth Engineer" OR "Experimentation Engineer" OR "A/B Testing Engineer" OR "Software Engineer, Growth"'
    enabled: true

  - name: Greenhouse — Growth Engineer
    query: 'site:job-boards.greenhouse.io "Growth Engineer" OR "Experimentation Engineer" OR "A/B Testing Engineer" OR "Software Engineer, Growth" remote'
    enabled: true

  - name: Lever — Growth Engineer
    query: 'site:jobs.lever.co "Growth Engineer" OR "Experimentation Engineer" OR "A/B Testing Engineer" OR "Software Engineer, Growth" remote'
    enabled: true

  - name: Wellfound — Growth Engineer
    query: 'site:wellfound.com "Growth Engineer" OR "Experimentation Engineer" OR "Growth Software Engineer" remote'
    enabled: true

  - name: Workable — Growth Engineer
    query: 'site:apply.workable.com "Growth Engineer" OR "Experimentation Engineer" OR "CRO Engineer" remote'
    enabled: true

  - name: Ashby — CRO / Optimization Engineer
    query: 'site:jobs.ashbyhq.com "CRO Engineer" OR "Conversion Rate Optimization" OR "Optimization Engineer" OR "Web Experimentation Engineer"'
    enabled: true

  - name: Greenhouse — CRO / Optimization Engineer
    query: 'site:job-boards.greenhouse.io "CRO Engineer" OR "Conversion Rate Optimization" OR "Optimization Engineer" OR "Digital Optimization Engineer" remote'
    enabled: true

  - name: Lever — CRO / Optimization Engineer
    query: 'site:jobs.lever.co "CRO Engineer" OR "Conversion Rate Optimization" OR "Optimization Engineer" OR "Growth & Experimentation" remote'
    enabled: true

  # -- Agency / Consultancy roles --
  - name: Agency Frontend — All portals
    query: '"Frontend Developer" OR "Frontend Engineer" agency OR consultancy React TypeScript remote OR "New York"'
    enabled: true

  # -- E-commerce frontend --
  - name: E-commerce Frontend — All portals
    query: '"Frontend Engineer" OR "UI Engineer" ecommerce OR "e-commerce" OR Shopify OR SFCC React TypeScript'
    enabled: true

